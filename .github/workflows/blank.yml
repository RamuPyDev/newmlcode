name: Model Training CICD

permissions:
id-token: write
contents: write
pull-requests: write

on:
push:

jobs:
run:
runs-on: ubuntu-22.04


steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Setup CML
    uses: iterative/setup-cml@v2
    with:
      vega: false

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Train Model
    env:
      REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: |
      python train_model.py

      echo "# Model Training Report" > report.md
      echo "" >> report.md

      echo "## Scores" >> report.md
      cat scores.txt >> report.md

      echo "" >> report.md
      echo "## Confusion Matrix" >> report.md
      echo "![](./ConfusionMatrix.png)" >> report.md

      echo "" >> report.md
      echo "## Feature Importance" >> report.md
      echo "![](./FeatureImportance.png)" >> report.md

      cml comment create report.md
